<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JK Lee Homepage</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f3f3;
}

header{
    background-image:url("background.png.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    color:white;

    padding:260px 80px 180px 80px;

    text-align:left;
}

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;

    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(8px);

    text-align:center;
    padding:18px 0;
}

nav a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:18px;
}

section{
    width:80%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

footer{
    background:#1f4e79;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
    .quick-menu{

    width:90%;
    margin:-120px auto 80px;

    display:flex;

    justify-content:space-between;

    gap:20px;

    position:relative;

    z-index:100;

}

.card{

    flex:1;

    background:rgba(20,40,70,.65);

    backdrop-filter:blur(8px);

    border:1px solid rgba(255,255,255,.25);

    border-radius:18px;

    color:white;

    text-align:center;

    padding:35px 15px;

    transition:.3s;

}

.card:hover{

    transform:translateY(-10px);

    background:rgba(40,70,110,.9);

}

.card h3{

    margin:15px 0 10px;

    font-size:24px;

}

.card p{

    font-size:16px;

    line-height:28px;

}

</style>

</head>
