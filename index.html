<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JK Lee Homepage</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
}

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(8px);
    padding:18px 0;
    text-align:center;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
    margin-right:70px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:17px;
    font-weight:bold;
}

header{
    min-height:100vh;
    background-image:url("background.png.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
    padding:150px 80px 60px 80px;
    box-sizing:border-box;
}

.hero-text{
    max-width:720px;
}

.hero-text .small{
    font-size:26px;
    margin-bottom:20px;
}

.hero-text h1{
    font-size:86px;
    line-height:1.05;
    margin:0 0 30px 0;
}

.hero-text .desc{
    font-size:24px;
    line-height:1.6;
    margin-bottom:40px;
}

.quick-menu{
    width:100%;
    display:flex;
    justify-content:center;
    gap:22px;
    margin-top:45px;
    flex-wrap:nowrap;
}

.card{
    width:190px;
    height:155px;
    background:rgba(15,35,65,.72);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.28);
    border-radius:18px;
    color:white;
    text-align:center;
    text-decoration:none;
    padding:25px 15px;
    box-sizing:border-box;
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
    background:rgba(45,75,115,.9);
}

.card h3{
    margin:0 0 15px 0;
    font-size:22px;
}

.card p{
    margin:0;
    font-size:15px;
    line-height:1.45;
}

@media(max-width:1100px){
    .quick-menu{
        flex-wrap:wrap;
    }

    .hero-text h1{
        font-size:60px;
    }
}
</style>
</head>

<body>

<nav>
    <span class="logo">JK Lee</span>
    <a href="index.html">Home</a>
    <a href="economics.html">Economics</a>
    <a href="graphs.html">Graphs</a>
    <a href="programs.html">Programs</a>
    <a href="contact.html">Contact</a>
</nav>

<header>

    <div class="quick-menu">

    <div class="card">
        <h3>Economics</h3>
        <p>Micro, Macro & International Economics</p>
    </div>

    <div class="card">
        <h3>History</h3>
        <p>Economic History</p>
    </div>

    <div class="card">
        <h3>Graphs</h3>
        <p>Economic Graphs</p>
    </div>

    <div class="card">
        <h3>Programs</h3>
        <p>WPF Applications</p>
    </div>

    <div class="card">
        <h3>Research</h3>
        <p>Study Notes</p>
    </div>

    <div class="card">
        <h3>Gallery</h3>
        <p>Images & Resources</p>
    </div>

    <div class="card">
        <h3>Contact</h3>
        <p>Questions & Feedback</p>
    </div>

</div>

</header>

</body>
</html>

</body>
</html>
